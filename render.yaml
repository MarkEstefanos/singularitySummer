databases:
  - name: singularity-db
    plan: free
    databaseName: singularity
    postgresMajorVersion: 17
    ipAllowList: []

services:
  - type: web
    name: singularity
    runtime: elixir
    plan: free
    buildCommand: |
      mix deps.get --only prod
      MIX_ENV=prod mix compile
      MIX_ENV=prod mix assets.deploy
      MIX_ENV=prod mix release
    startCommand: _build/prod/rel/singularity/bin/migrate && _build/prod/rel/singularity/bin/server
    envVars:
      - key: MIX_ENV
        value: "prod"
      - key: ELIXIR_VERSION
        value: "1.19.4"
      - key: ERLANG_VERSION
        value: "28.2"
      - key: PHX_HOST
        fromRenderService:
          type: web
          name: singularity
          property: host
      - key: PHX_SERVER
        value: "true"
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: singularity-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: POOL_SIZE
        value: "5"
