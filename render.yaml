databases:
  - name: singularity-db
    plan: free
    databaseName: singularity
    postgresMajorVersion: 17
    ipAllowList: []

services:
  - type: web
    name: singularity
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: PHX_HOST
        fromRenderService:
          type: web
          name: singularity
          property: host
      - key: PHX_SERVER
        value: "true"
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: singularity-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: POOL_SIZE
        value: "5"
